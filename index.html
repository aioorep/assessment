<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Qualification Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #2a2f45;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4f8ef7;
    --go: #22c55e;
    --go-bg: #052e14;
    --nogo: #ef4444;
    --nogo-bg: #2d0a0a;
    --warn: #f59e0b;
    --warn-bg: #2d1f00;
    --gate0: #ef4444;
    --gate1: #f97316;
    --gate2: #3b82f6;
    --gate3: #06b6d4;
    --gate4: #10b981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-left { display: flex; flex-direction: column; gap: 4px; }

  .header-title {
    font-family: Poppins, sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-deal {
    font-family: Poppins, monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .header-deal span {
    color: var(--accent);
  }

  .save-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: Poppins , sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .save-btn:hover { background: #3b7de8; transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }
  .save-btn.saving { background: var(--warn); }
  .save-btn.saved { background: var(--go); }

  /* PROGRESS BAR */
  .progress-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-gates {
    display: flex;
    gap: 8px;
    flex: 1;
  }

  .gate-pill {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.3s;
  }
  .gate-pill.pass { background: var(--go); }
  .gate-pill.fail { background: var(--nogo); }
  .gate-pill.partial { background: var(--warn); }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* MAIN CONTENT */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  /* VERDICT BANNER */
  .verdict-banner {
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: none;
    align-items: center;
    gap: 16px;
    font-weight: 500;
  }
  .verdict-banner.show { display: flex; }
  .verdict-banner.go-banner { background: var(--go-bg); border: 1px solid var(--go); color: var(--go); }
  .verdict-banner.nogo-banner { background: var(--nogo-bg); border: 1px solid var(--nogo); color: var(--nogo); }
  .verdict-banner.warn-banner { background: var(--warn-bg); border: 1px solid var(--warn); color: var(--warn); }
  .verdict-icon { font-size: 24px; }
  .verdict-text { flex: 1; }
  .verdict-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .verdict-sub { font-size: 13px; opacity: 0.8; margin-top: 2px; }

  /* GATE CARD */
  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .gate-card.gate-pass { border-color: var(--go); }
  .gate-card.gate-fail { border-color: var(--nogo); }

  .gate-header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .gate-number {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Poppins, sans-serif;
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .gate-info { flex: 1; }

  .gate-title {
    font-family: Poppins, sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .gate-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .gate-badge {
    font-family: Poppins, monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .badge-binary { background: rgba(239,68,68,0.15); color: var(--nogo); border: 1px solid rgba(239,68,68,0.3); }
  .badge-standard { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }

  /* QUESTIONS */
  .questions-list { padding: 8px 0; }

  .question-row {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: start;
    transition: background 0.2s;
  }
  .question-row:last-child { border-bottom: none; }
  .question-row:hover { background: var(--surface2); }

  .question-left { display: flex; flex-direction: column; gap: 8px; }

  .question-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
  }

  .question-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    font-style: italic;
  }

  .go-nogo-labels {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .go-label {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--go-bg);
    color: var(--go);
    border: 1px solid rgba(34,197,94,0.2);
    font-family: 'DM Mono', monospace;
  }

  .nogo-label {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--nogo-bg);
    color: var(--nogo);
    border: 1px solid rgba(239,68,68,0.2);
    font-family: Poppins, monospace;
  }

  /* TOGGLE */
  .toggle-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .toggle-options {
    display: flex;
    gap: 6px;
  }

  .toggle-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: Poppins, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .toggle-btn:hover { border-color: var(--accent); color: var(--text); }

  .toggle-btn.go-active {
    background: var(--go-bg);
    border-color: var(--go);
    color: var(--go);
  }

  .toggle-btn.nogo-active {
    background: var(--nogo-bg);
    border-color: var(--nogo);
    color: var(--nogo);
  }

  /* NOTES FIELD */
  .notes-field {
    width: 220px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: Poppins, sans-serif;
    font-size: 12px;
    resize: none;
    height: 36px;
    transition: border-color 0.2s, height 0.2s;
  }

  .notes-field:focus {
    outline: none;
    border-color: var(--accent);
    height: 64px;
  }

  /* FINAL SUMMARY */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-top: 32px;
  }

  .summary-title {
    font-family: Poppins, sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 12px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .summary-gate {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    transition: all 0.3s;
  }

  .summary-gate.pass { background: var(--go-bg); border-color: var(--go); }
  .summary-gate.fail { background: var(--nogo-bg); border-color: var(--nogo); }

  .summary-gate-num {
    font-family: Poppins, sans-serif;
    font-size: 20px;
    font-weight: 800;
  }

  .summary-gate-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-family: Poppins, monospace;
  }

  .summary-gate.pass .summary-gate-num { color: var(--go); }
  .summary-gate.fail .summary-gate-num { color: var(--nogo); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
    max-width: 320px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success { border-color: var(--go); }
  .toast.error { border-color: var(--nogo); }

  /* LAST SAVED */
  .last-saved {
    font-family: Poppins, monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
  }

  /* LOADING */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 16px;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: Poppins, monospace;
    font-size: 13px;
    color: var(--muted);
  }

  @media (max-width: 640px) {
    .header { padding: 16px 20px; }
    .container { padding: 24px 16px 80px; }
    .progress-bar { padding: 12px 20px; }
    .question-row { grid-template-columns: 1fr; }
    .toggle-group { align-items: flex-start; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .notes-field { width: 100%; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Chargement des données...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-title">Discovery Qualification Scorecard</div>
    <div class="header-deal">Deal : <span id="dealTitle">—</span> &nbsp;|&nbsp; ID : <span id="dealId">—</span></div>
  </div>
  <button class="save-btn" id="saveBtn" onclick="saveData()">
    <span id="saveBtnIcon">💾</span>
    <span id="saveBtnText">Sauvegarder</span>
  </button>
</div>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-gates">
    <div class="gate-pill" id="pill0"></div>
    <div class="gate-pill" id="pill1"></div>
    <div class="gate-pill" id="pill2"></div>
    <div class="gate-pill" id="pill3"></div>
    <div class="gate-pill" id="pill4"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 5 gates évalués</div>
</div>

<div class="container">

  <!-- VERDICT -->
  <div class="verdict-banner" id="verdictBanner">
    <div class="verdict-icon" id="verdictIcon"></div>
    <div class="verdict-text">
      <div class="verdict-title" id="verdictTitle"></div>
      <div class="verdict-sub" id="verdictSub"></div>
    </div>
  </div>

  <!-- GATES -->
  <div id="gatesContainer"></div>

  <!-- SUMMARY -->
  <div class="summary-card">
    <div class="summary-title">Résumé des gates</div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="last-saved" id="lastSaved"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon">✅</span>
  <span id="toastMsg">Sauvegardé avec succès</span>
</div>

<script>
// ============================================================
//  CONFIGURATION — À MODIFIER
// ============================================================
const APPS_SCRIPT_URL = 'VOTRE_APPS_SCRIPT_URL_ICI';

// ============================================================
//  DONNÉES DU SCORECARD
// ============================================================
const GATES = [
  {
    id: 0,
    title: 'Gate 0 — Infrastructure Control',
    subtitle: 'Binary pre-qualifier — if failed, stop immediately. Do not continue Discovery.',
    color: '#ef4444',
    badge: 'BINARY',
    badgeClass: 'badge-binary',
    critical: true,
    questions: [
      {
        id: 'g0q1',
        text: 'Does the prospect own or directly operate their in-store screens?',
        go: 'Yes — retailer owns screens and controls installation rights',
        nogo: 'No — screens owned or managed by a third-party network',
        note: "If unclear, ask: 'Who manages your in-store screen infrastructure?'"
      },
      {
        id: 'g0q2',
        text: 'Can AiOO obtain installation rights for IoT hardware at store level?',
        go: 'Yes — retailer can grant site access and installation approval',
        nogo: 'No — third party controls access or blocks hardware installation',
        note: 'Retail media networks without screen control are demand partners, not retailer prospects'
      }
    ]
  },
  {
    id: 1,
    title: 'Gate 1 — Strategic Fit',
    subtitle: 'Confirm the retailer operates in a category with strong FMCG advertiser demand.',
    color: '#f97316',
    badge: 'STANDARD',
    badgeClass: 'badge-standard',
    critical: true,
    questions: [
      {
        id: 'g1q1',
        text: 'What retail category does this prospect operate in?',
        go: 'Grocery, pharmacy, home improvement, electronics, convenience',
        nogo: 'B2B wholesale, luxury, niche specialty with no FMCG relevance',
        note: 'Category must attract FMCG brands already in AiOO\'s demand pipeline'
      },
      {
        id: 'g1q2',
        text: 'Are major FMCG brands present and active in this retailer\'s stores?',
        go: 'Yes — FMCG brands with large ad budgets actively sell through this retailer',
        nogo: 'No — limited or no FMCG brand presence in their category or geography',
        note: 'Cross-reference AiOO\'s active brand pipeline to confirm overlap'
      },
      {
        id: 'g1q3',
        text: 'Does the retailer operate in a geography where AiOO has or can secure brand demand?',
        go: 'Yes — UAE, KSA, EU market with confirmed or pipeline brand demand',
        nogo: 'No — geography with no brand demand visibility and no near-term pipeline',
        note: "Geography must align with AiOO's current or planned market activation"
      }
    ]
  },
  {
    id: 2,
    title: 'Gate 2 — Network Scale',
    subtitle: "Confirm the retailer's network is large enough to justify pilot investment.",
    color: '#3b82f6',
    badge: 'STANDARD',
    badgeClass: 'badge-standard',
    critical: false,
    questions: [
      {
        id: 'g2q1',
        text: 'How many stores does the retailer operate in the target market?',
        go: '10+ stores in a single market with screen deployment potential',
        nogo: 'Fewer than 5 stores with no near-term expansion plan',
        note: 'Pilot requires a single store — but total network must justify full deployment'
      },
      {
        id: 'g2q2',
        text: 'How many screens or screen locations exist or are planned per store?',
        go: '5+ screens per store, or clear willingness to deploy at scale',
        nogo: '1-2 screens per store with no appetite for expansion',
        note: 'Minimum viable network for meaningful programmatic revenue is approx. 50+ screens total'
      },
      {
        id: 'g2q3',
        text: 'Is the store estate geographically concentrated enough for efficient deployment?',
        go: 'Stores concentrated in one city or region — operationally efficient',
        nogo: 'Highly dispersed estate with no concentration — high deployment cost',
        note: 'Borderline cases escalate to Sales Lead — do not make unilateral Go decision'
      }
    ]
  },
  {
    id: 3,
    title: 'Gate 3 — Data Access Willingness',
    subtitle: 'Confirm the retailer is open to the data integrations that power Pulse and Echo.',
    color: '#06b6d4',
    badge: 'STANDARD',
    badgeClass: 'badge-standard',
    critical: true,
    questions: [
      {
        id: 'g3q1',
        text: 'Is the retailer open in principle to sharing anonymised audience data from their stores?',
        go: 'Yes — open to anonymised audience measurement and data use for campaign targeting',
        nogo: 'No — firm refusal to allow any form of audience data collection on premises',
        note: 'Required for AiOO Pulse. Frame as anonymised, aggregated, GDPR-compliant'
      },
      {
        id: 'g3q2',
        text: 'Is the retailer open to POS data integration for campaign attribution?',
        go: 'Yes — willing to explore transaction data integration for attribution reporting',
        nogo: 'No — firm refusal to share any POS or sales data under any conditions',
        note: "Required for AiOO Echo. This is AiOO's core differentiator — non-negotiable"
      },
      {
        id: 'g3q3',
        text: 'Does the retailer have existing data governance constraints that could block integration?',
        go: 'No blocking constraints, or constraints that can be resolved with standard DPA',
        nogo: 'Hard contractual or regulatory blocks on third-party data access',
        note: 'GDPR, local data law, or exclusive data agreements with competitors are hard blocks'
      }
    ]
  },
  {
    id: 4,
    title: 'Gate 4 — Commercial Openness',
    subtitle: 'Confirm genuine intent and decision-making authority before investing further resources.',
    color: '#10b981',
    badge: 'STANDARD',
    badgeClass: 'badge-standard',
    critical: false,
    questions: [
      {
        id: 'g4q1',
        text: 'Is the person you are speaking with a decision-maker or a direct influencer?',
        go: 'C-suite, Commercial Director, or Head of Retail Media with budget authority',
        nogo: 'Junior contact with no authority and no confirmed access to decision-maker',
        note: "If not DM, ask: 'Who would need to be involved to move this forward?' Map the org."
      },
      {
        id: 'g4q2',
        text: 'Is the retailer genuinely exploring screen monetisation, or gathering market information?',
        go: 'Active intent — they have a monetisation objective and a timeline',
        nogo: 'Passive curiosity — benchmarking, no internal mandate or budget allocated',
        note: "Ask: 'What would success look like for you in the next 12 months?' Listen for specifics."
      },
      {
        id: 'g4q3',
        text: 'Is the retailer open in principle to an exclusivity arrangement with AiOO?',
        go: 'Open to exclusivity, or willing to discuss terms',
        nogo: 'Hard refusal — existing exclusive agreement with a competitor already signed',
        note: 'Exclusivity is a commercial negotiation point — openness to discuss is sufficient at this stage'
      },
      {
        id: 'g4q4',
        text: 'Does the retailer have any existing technology or partnerships that could conflict?',
        go: 'No conflicting technology or partnerships in place',
        nogo: 'Existing exclusive contract with a direct AiOO competitor covering same scope',
        note: 'Partial overlap is manageable — only hard exclusive conflicts are a No-Go at Discovery'
      }
    ]
  }
];

// ============================================================
//  STATE
// ============================================================
let answers = {}; // { questionId: 'go' | 'nogo' | null }
let notes = {};   // { questionId: 'texte libre' }
let dealId = '';
let dealTitle = '';
let lastSavedAt = null;

// ============================================================
//  INIT
// ============================================================
window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  dealId = params.get('deal_id') || 'TEST';
  dealTitle = decodeURIComponent(params.get('prospect') || 'Prospect inconnu');

  document.getElementById('dealId').textContent = dealId;
  document.getElementById('dealTitle').textContent = dealTitle;

  renderGates();
  renderSummary();

  // Load existing data
  if (APPS_SCRIPT_URL !== 'VOTRE_APPS_SCRIPT_URL_ICI') {
    await loadData();
  } else {
    // Demo mode — load from localStorage
    const saved = localStorage.getItem('scorecard_' + dealId);
    if (saved) {
      const data = JSON.parse(saved);
      answers = data.answers || {};
      notes = data.notes || {};
      applyAnswers();
    }
  }

  document.getElementById('loadingOverlay').classList.add('hidden');
  updateProgress();
  updateVerdict();
};

// ============================================================
//  RENDER GATES
// ============================================================
function renderGates() {
  const container = document.getElementById('gatesContainer');
  container.innerHTML = '';

  GATES.forEach(gate => {
    const card = document.createElement('div');
    card.className = 'gate-card';
    card.id = 'gate-card-' + gate.id;

    card.innerHTML = `
      <div class="gate-header">
        <div class="gate-number" style="background: ${gate.color}22; color: ${gate.color}">${gate.id}</div>
        <div class="gate-info">
          <div class="gate-title" style="color: ${gate.color}">${gate.title}</div>
          <div class="gate-subtitle">${gate.subtitle}</div>
        </div>
        <div class="gate-badge ${gate.badgeClass}">${gate.badge}</div>
      </div>
      <div class="questions-list">
        ${gate.questions.map(q => renderQuestion(q)).join('')}
      </div>
    `;

    container.appendChild(card);
  });
}

function renderQuestion(q) {
  return `
    <div class="question-row" id="row-${q.id}">
      <div class="question-left">
        <div class="question-text">${q.text}</div>
        <div class="go-nogo-labels">
          <span class="go-label">✓ ${q.go}</span>
          <span class="nogo-label">✗ ${q.nogo}</span>
        </div>
        ${q.note ? `<div class="question-note">💡 ${q.note}</div>` : ''}
      </div>
      <div class="toggle-group">
        <div class="toggle-options">
          <button class="toggle-btn" id="go-${q.id}" onclick="setAnswer('${q.id}', 'go')">✓ GO</button>
          <button class="toggle-btn" id="nogo-${q.id}" onclick="setAnswer('${q.id}', 'nogo')">✗ NO-GO</button>
        </div>
        <textarea class="notes-field" id="notes-${q.id}" placeholder="Notes..." 
          onchange="setNote('${q.id}', this.value)"
          onfocus="this.style.height='64px'"
          onblur="this.style.height='36px'"
        ></textarea>
      </div>
    </div>
  `;
}

// ============================================================
//  RENDER SUMMARY
// ============================================================
function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = GATES.map(g => `
    <div class="summary-gate" id="summary-gate-${g.id}">
      <div class="summary-gate-num" style="color: ${g.color}">${g.id}</div>
      <div class="summary-gate-label">${g.title.split('—')[1]?.trim() || ''}</div>
    </div>
  `).join('');
}

// ============================================================
//  ANSWER LOGIC
// ============================================================
function setAnswer(questionId, value) {
  if (answers[questionId] === value) {
    answers[questionId] = null;
    document.getElementById('go-' + questionId).className = 'toggle-btn';
    document.getElementById('nogo-' + questionId).className = 'toggle-btn';
  } else {
    answers[questionId] = value;
    document.getElementById('go-' + questionId).className = value === 'go' ? 'toggle-btn go-active' : 'toggle-btn';
    document.getElementById('nogo-' + questionId).className = value === 'nogo' ? 'toggle-btn nogo-active' : 'toggle-btn';
  }
  updateProgress();
  updateVerdict();
  updateGateCard();
}

function setNote(questionId, value) {
  notes[questionId] = value;
}

function applyAnswers() {
  Object.entries(answers).forEach(([qId, val]) => {
    if (!val) return;
    const goBtn = document.getElementById('go-' + qId);
    const nogoBtn = document.getElementById('nogo-' + qId);
    if (goBtn) goBtn.className = val === 'go' ? 'toggle-btn go-active' : 'toggle-btn';
    if (nogoBtn) nogoBtn.className = val === 'nogo' ? 'toggle-btn nogo-active' : 'toggle-btn';
  });
  Object.entries(notes).forEach(([qId, val]) => {
    const field = document.getElementById('notes-' + qId);
    if (field) field.value = val;
  });
  updateGateCard();
}

// ============================================================
//  GATE STATUS
// ============================================================
function getGateStatus(gate) {
  const qIds = gate.questions.map(q => q.id);
  const answered = qIds.filter(id => answers[id]);
  if (answered.length === 0) return 'unanswered';
  const hasNogo = qIds.some(id => answers[id] === 'nogo');
  const allAnswered = answered.length === qIds.length;
  if (hasNogo) return 'fail';
  if (allAnswered) return 'pass';
  return 'partial';
}

function updateGateCard() {
  GATES.forEach(gate => {
    const status = getGateStatus(gate);
    const card = document.getElementById('gate-card-' + gate.id);
    const summaryEl = document.getElementById('summary-gate-' + gate.id);
    card.className = 'gate-card';
    summaryEl.className = 'summary-gate';
    if (status === 'pass') {
      card.classList.add('gate-pass');
      summaryEl.classList.add('pass');
    } else if (status === 'fail') {
      card.classList.add('gate-fail');
      summaryEl.classList.add('fail');
    }
  });
}

// ============================================================
//  PROGRESS
// ============================================================
function updateProgress() {
  let completed = 0;
  GATES.forEach((gate, i) => {
    const status = getGateStatus(gate);
    const pill = document.getElementById('pill' + i);
    pill.className = 'gate-pill';
    if (status === 'pass') { pill.classList.add('pass'); completed++; }
    else if (status === 'fail') { pill.classList.add('fail'); completed++; }
    else if (status === 'partial') { pill.classList.add('partial'); }
  });
  document.getElementById('progressLabel').textContent = `${completed} / 5 gates évalués`;
}

// ============================================================
//  VERDICT
// ============================================================
function updateVerdict() {
  const banner = document.getElementById('verdictBanner');
  const criticalFail = GATES.filter(g => g.critical).some(g => getGateStatus(g) === 'fail');
  const borderline = GATES.filter(g => !g.critical).some(g => getGateStatus(g) === 'fail');
  const allPass = GATES.every(g => getGateStatus(g) === 'pass');
  const anyAnswered = Object.values(answers).some(v => v);

  banner.className = 'verdict-banner';

  if (!anyAnswered) { banner.classList.remove('show'); return; }

  if (criticalFail) {
    banner.classList.add('show', 'nogo-banner');
    document.getElementById('verdictIcon').textContent = '🚫';
    document.getElementById('verdictTitle').textContent = 'DISQUALIFIÉ — Gate critique échoué';
    document.getElementById('verdictSub').textContent = 'Arrêter immédiatement. Logger la raison dans le CRM.';
  } else if (allPass) {
    banner.classList.add('show', 'go-banner');
    document.getElementById('verdictIcon').textContent = '✅';
    document.getElementById('verdictTitle').textContent = 'ALL GATES PASS — Proceed to Site Assessment';
    document.getElementById('verdictSub').textContent = 'Tous les critères sont validés. Passer à l\'étape suivante.';
  } else if (borderline) {
    banner.classList.add('show', 'warn-banner');
    document.getElementById('verdictIcon').textContent = '⚠️';
    document.getElementById('verdictTitle').textContent = 'BORDERLINE — Escalader au Sales Lead';
    document.getElementById('verdictSub').textContent = 'Gate 2 ou 4 en échec. Ne pas décider seul — escalader avant de continuer.';
  } else {
    banner.classList.remove('show');
  }
}

// ============================================================
//  SAVE DATA
// ============================================================
async function saveData() {
  const btn = document.getElementById('saveBtn');
  const btnText = document.getElementById('saveBtnText');
  const btnIcon = document.getElementById('saveBtnIcon');

  btn.className = 'save-btn saving';
  btnIcon.textContent = '⏳';
  btnText.textContent = 'Sauvegarde...';

  const payload = {
    action: 'save',
    deal_id: dealId,
    deal_title: dealTitle,
    timestamp: new Date().toISOString(),
    answers: answers,
    notes: notes,
    verdict: getVerdict()
  };

  try {
    if (APPS_SCRIPT_URL !== 'VOTRE_APPS_SCRIPT_URL_ICI') {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
    } else {
      // Demo mode
      localStorage.setItem('scorecard_' + dealId, JSON.stringify({ answers, notes }));
      await new Promise(r => setTimeout(r, 800));
    }

    lastSavedAt = new Date();
    document.getElementById('lastSaved').textContent = 'Dernière sauvegarde : ' + lastSavedAt.toLocaleTimeString('fr-FR');

    btn.className = 'save-btn saved';
    btnIcon.textContent = '✅';
    btnText.textContent = 'Sauvegardé !';

    showToast('Données sauvegardées dans Google Sheets', 'success');

    setTimeout(() => {
      btn.className = 'save-btn';
      btnIcon.textContent = '💾';
      btnText.textContent = 'Sauvegarder';
    }, 2500);

  } catch (err) {
    btn.className = 'save-btn';
    btnIcon.textContent = '💾';
    btnText.textContent = 'Sauvegarder';
    showToast('Erreur lors de la sauvegarde', 'error');
  }
}

// ============================================================
//  LOAD DATA
// ============================================================
async function loadData() {
  try {
    const url = APPS_SCRIPT_URL + '?action=load&deal_id=' + encodeURIComponent(dealId);
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.answers) {
      answers = data.answers;
      notes = data.notes || {};
      applyAnswers();
      if (data.timestamp) {
        document.getElementById('lastSaved').textContent = 'Dernière sauvegarde : ' + new Date(data.timestamp).toLocaleString('fr-FR');
      }
    }
  } catch (err) {
    console.warn('Impossible de charger les données:', err);
  }
}

// ============================================================
//  VERDICT STRING
// ============================================================
function getVerdict() {
  const criticalFail = GATES.filter(g => g.critical).some(g => getGateStatus(g) === 'fail');
  const borderline = GATES.filter(g => !g.critical).some(g => getGateStatus(g) === 'fail');
  const allPass = GATES.every(g => getGateStatus(g) === 'pass');
  if (criticalFail) return 'DISQUALIFIED';
  if (allPass) return 'GO';
  if (borderline) return 'BORDERLINE';
  return 'IN_PROGRESS';
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.className = 'toast', 3000);
}
</script>
