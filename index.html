<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiOO — Discovery Qualification Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* AiOO Brand Colors */
    --cyan:       #5CE1E6;
    --cyan-dark:  #1a9ea3;
    --cyan-bg:    rgba(92,225,230,0.08);
    --cyan-border:rgba(92,225,230,0.25);
    --grey:       #464646;
    --deep-black: #0B0F14;
    --purple:     #6F1AED;
    --purple-bg:  rgba(111,26,237,0.1);
    --orange:     #FF6F00;
    --orange-bg:  rgba(255,111,0,0.1);
    --white:      #FFFFFF;
    --surface:    #131820;
    --surface2:   #1a2130;
    --border:     rgba(92,225,230,0.12);
    --text:       #FFFFFF;
    --muted:      rgba(255,255,255,0.45);
    --go:         #5CE1E6;
    --go-bg:      rgba(92,225,230,0.08);
    --nogo:       #FF6F00;
    --nogo-bg:    rgba(255,111,0,0.08);
    --warn:       #6F1AED;
    --warn-bg:    rgba(111,26,237,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--deep-black);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(92,225,230,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(92,225,230,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ───────────────────────────────────── */
  .header {
    background: rgba(11,15,20,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 68px;
    backdrop-filter: blur(20px);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* AiOO SVG Logo text */
  .logo-svg {
    height: 28px;
    width: auto;
  }

  .header-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .header-deal-info {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .deal-tag {
    background: var(--cyan-bg);
    border: 1px solid var(--cyan-border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--cyan);
    font-family: 'Poppins', monospace;
  }

  .save-btn {
    background: var(--cyan);
    color: var(--deep-black);
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .save-btn:hover { background: #7aeaee; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(92,225,230,0.3); }
  .save-btn:active { transform: translateY(0); }
  .save-btn.saving { background: var(--purple); color: white; }
  .save-btn.saved  { background: #22c55e; color: white; }

  /* ── PROGRESS ─────────────────────────────────── */
  .progress-bar {
    background: rgba(11,15,20,0.8);
    border-bottom: 1px solid var(--border);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 10;
  }

  .progress-gates {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .gate-pill {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: background 0.4s;
  }
  .gate-pill.pass    { background: var(--cyan); box-shadow: 0 0 8px rgba(92,225,230,0.5); }
  .gate-pill.fail    { background: var(--orange); }
  .gate-pill.partial { background: var(--purple); }

  .progress-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── MAIN ─────────────────────────────────────── */
  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 36px 24px 100px;
    position: relative;
    z-index: 1;
  }

  /* ── VERDICT BANNER ───────────────────────────── */
  .verdict-banner {
    border-radius: 14px;
    padding: 18px 24px;
    margin-bottom: 28px;
    display: none;
    align-items: center;
    gap: 16px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .verdict-banner.show { display: flex; }
  .verdict-banner.go-banner   { background: var(--cyan-bg); border: 1px solid var(--cyan-border); }
  .verdict-banner.nogo-banner { background: var(--orange-bg); border: 1px solid rgba(255,111,0,0.3); }
  .verdict-banner.warn-banner { background: var(--purple-bg); border: 1px solid rgba(111,26,237,0.3); }

  .verdict-icon { font-size: 26px; flex-shrink: 0; }
  .verdict-text { flex: 1; }
  .verdict-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .verdict-sub   { font-size: 12px; opacity: 0.7; margin-top: 2px; font-weight: 400; }
  .go-banner .verdict-title   { color: var(--cyan); }
  .nogo-banner .verdict-title { color: var(--orange); }
  .warn-banner .verdict-title { color: #a855f7; }

  /* ── GATE CARD ────────────────────────────────── */
  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .gate-card.gate-pass { border-color: rgba(92,225,230,0.4); box-shadow: 0 0 24px rgba(92,225,230,0.06); }
  .gate-card.gate-fail { border-color: rgba(255,111,0,0.4);  box-shadow: 0 0 24px rgba(255,111,0,0.06); }

  .gate-header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .gate-number {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    flex-shrink: 0;
    border: 1px solid;
  }

  .gate-info { flex: 1; }

  .gate-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .gate-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
    line-height: 1.4;
  }

  .gate-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .badge-binary   { background: rgba(255,111,0,0.15); color: var(--orange); border: 1px solid rgba(255,111,0,0.3); }
  .badge-standard { background: var(--cyan-bg); color: var(--cyan); border: 1px solid var(--cyan-border); }

  /* ── QUESTIONS ────────────────────────────────── */
  .questions-list { padding: 4px 0; }

  .question-row {
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: start;
    transition: background 0.15s;
  }
  .question-row:last-child { border-bottom: none; }
  .question-row:hover { background: rgba(92,225,230,0.02); }

  .question-left { display: flex; flex-direction: column; gap: 8px; }

  .question-text {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
  }

  .go-nogo-labels {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .go-label {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(92,225,230,0.08);
    color: var(--cyan);
    border: 1px solid rgba(92,225,230,0.2);
    font-weight: 500;
    line-height: 1.4;
  }

  .nogo-label {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,111,0,0.08);
    color: var(--orange);
    border: 1px solid rgba(255,111,0,0.2);
    font-weight: 500;
    line-height: 1.4;
  }

  .question-note {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    font-weight: 400;
  }

  /* ── TOGGLE ───────────────────────────────────── */
  .toggle-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .toggle-options { display: flex; gap: 6px; }

  .toggle-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .toggle-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  .toggle-btn.go-active {
    background: rgba(92,225,230,0.12);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(92,225,230,0.15);
  }

  .toggle-btn.nogo-active {
    background: rgba(255,111,0,0.12);
    border-color: var(--orange);
    color: var(--orange);
  }

  .notes-field {
    width: 200px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 400;
    resize: none;
    height: 34px;
    transition: border-color 0.2s, height 0.2s;
  }

  .notes-field::placeholder { color: var(--muted); }
  .notes-field:focus {
    outline: none;
    border-color: var(--cyan-border);
    height: 60px;
    background: rgba(92,225,230,0.04);
  }

  /* ── SUMMARY ──────────────────────────────────── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-top: 28px;
  }

  .summary-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .summary-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .summary-gate {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.3s;
  }

  .summary-gate.pass { background: rgba(92,225,230,0.08); border-color: rgba(92,225,230,0.3); }
  .summary-gate.fail { background: rgba(255,111,0,0.08);  border-color: rgba(255,111,0,0.3); }

  .summary-gate-num {
    font-size: 22px;
    font-weight: 800;
    color: rgba(255,255,255,0.2);
  }
  .summary-gate.pass .summary-gate-num { color: var(--cyan); }
  .summary-gate.fail .summary-gate-num { color: var(--orange); }

  .summary-gate-label {
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .last-saved {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    text-align: center;
  }

  /* ── TOAST ────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
    max-width: 320px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(92,225,230,0.4); }
  .toast.error   { border-color: rgba(255,111,0,0.4); }

  /* ── LOADING ──────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--deep-black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 20px;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-size: 32px;
    font-weight: 800;
    color: var(--cyan);
    letter-spacing: -1px;
  }

  .loading-logo span { color: white; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid rgba(92,225,230,0.15);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── CYAN GLOW ACCENT ─────────────────────────── */
  .cyan-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    margin-right: 6px;
    vertical-align: middle;
  }

  @media (max-width: 640px) {
    .header { padding: 0 16px; }
    .container { padding: 20px 14px 80px; }
    .progress-bar { padding: 10px 16px; }
    .question-row { grid-template-columns: 1fr; }
    .toggle-group { align-items: flex-start; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .notes-field { width: 100%; }
    .header-deal-info { display: none; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <img src="logoaioo.png" alt="AiOO" style="height:44px;width:auto;">
  <div class="spinner"></div>
  <div class="loading-text">Loading data...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <img src="logoaioo.png" alt="AiOO" class="logo-svg">
    <div class="header-divider"></div>
    <div class="header-title">Discovery Scorecard</div>
  </div>
  <div class="header-deal-info">
    <div class="deal-tag" id="dealTag">Deal #—</div>
    <div style="font-size:12px;color:var(--muted);font-weight:500;" id="dealTitleHeader">—</div>
  </div>
  <button class="save-btn" id="saveBtn" onclick="saveData()">
    <span id="saveBtnIcon">💾</span>
    <span id="saveBtnText">Save</span>
  </button>
</div>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-gates">
    <div class="gate-pill" id="pill0"></div>
    <div class="gate-pill" id="pill1"></div>
    <div class="gate-pill" id="pill2"></div>
    <div class="gate-pill" id="pill3"></div>
    <div class="gate-pill" id="pill4"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 5 gates evaluated</div>
</div>

<div class="container">

  <!-- VERDICT -->
  <div class="verdict-banner" id="verdictBanner">
    <div class="verdict-icon" id="verdictIcon"></div>
    <div class="verdict-text">
      <div class="verdict-title" id="verdictTitle"></div>
      <div class="verdict-sub" id="verdictSub"></div>
    </div>
  </div>

  <!-- GATES -->
  <div id="gatesContainer"></div>

  <!-- SUMMARY -->
  <div class="summary-card">
    <div class="summary-header">
      <div class="summary-title"><span class="cyan-dot"></span>Gates Summary</div>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="last-saved" id="lastSaved"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon">✅</span>
  <span id="toastMsg">Saved successfully</span>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const APPS_SCRIPT_URL = 'VOTRE_APPS_SCRIPT_URL_ICI';

// ============================================================
//  GATE DATA
// ============================================================
const GATES = [
  {
    id: 0,
    title: 'Gate 0 — Infrastructure Control',
    subtitle: 'Binary pre-qualifier — if failed, stop immediately. Do not continue Discovery.',
    color: '#FF6F00',
    badgeClass: 'badge-binary',
    badge: 'BINARY',
    critical: true,
    questions: [
      {
        id: 'g0q1',
        text: 'Does the prospect own or directly operate their in-store screens?',
        go: 'Yes — retailer owns screens and controls installation rights',
        nogo: 'No — screens owned or managed by a third-party network',
        note: "If unclear, ask: 'Who manages your in-store screen infrastructure?'"
      },
      {
        id: 'g0q2',
        text: 'Can AiOO obtain installation rights for IoT hardware at store level?',
        go: 'Yes — retailer can grant site access and installation approval',
        nogo: 'No — third party controls access or blocks hardware installation',
        note: 'Retail media networks without screen control are demand partners, not retailer prospects'
      }
    ]
  },
  {
    id: 1,
    title: 'Gate 1 — Strategic Fit',
    subtitle: 'Confirm the retailer operates in a category with strong FMCG advertiser demand.',
    color: '#5CE1E6',
    badgeClass: 'badge-standard',
    badge: 'STANDARD',
    critical: true,
    questions: [
      {
        id: 'g1q1',
        text: 'What retail category does this prospect operate in?',
        go: 'Grocery, pharmacy, home improvement, electronics, convenience',
        nogo: 'B2B wholesale, luxury, niche specialty with no FMCG relevance',
        note: "Category must attract FMCG brands already in AiOO's demand pipeline"
      },
      {
        id: 'g1q2',
        text: "Are major FMCG brands present and active in this retailer's stores?",
        go: 'Yes — FMCG brands with large ad budgets actively sell through this retailer',
        nogo: 'No — limited or no FMCG brand presence in their category or geography',
        note: "Cross-reference AiOO's active brand pipeline to confirm overlap"
      },
      {
        id: 'g1q3',
        text: 'Does the retailer operate in a geography where AiOO has or can secure brand demand?',
        go: 'Yes — UAE, KSA, EU market with confirmed or pipeline brand demand',
        nogo: 'No — geography with no brand demand visibility and no near-term pipeline',
        note: "Geography must align with AiOO's current or planned market activation"
      }
    ]
  },
  {
    id: 2,
    title: 'Gate 2 — Network Scale',
    subtitle: "Confirm the retailer's network is large enough to justify pilot investment.",
    color: '#6F1AED',
    badgeClass: 'badge-standard',
    badge: 'STANDARD',
    critical: false,
    questions: [
      {
        id: 'g2q1',
        text: 'How many stores does the retailer operate in the target market?',
        go: '10+ stores in a single market with screen deployment potential',
        nogo: 'Fewer than 5 stores with no near-term expansion plan',
        note: 'Pilot requires a single store — but total network must justify full deployment'
      },
      {
        id: 'g2q2',
        text: 'How many screens or screen locations exist or are planned per store?',
        go: '5+ screens per store, or clear willingness to deploy at scale',
        nogo: '1-2 screens per store with no appetite for expansion',
        note: 'Minimum viable network for meaningful programmatic revenue is approx. 50+ screens total'
      },
      {
        id: 'g2q3',
        text: 'Is the store estate geographically concentrated enough for efficient deployment?',
        go: 'Stores concentrated in one city or region — operationally efficient',
        nogo: 'Highly dispersed estate with no concentration — high deployment cost',
        note: 'Borderline cases escalate to Sales Lead — do not make unilateral Go decision'
      }
    ]
  },
  {
    id: 3,
    title: 'Gate 3 — Data Access Willingness',
    subtitle: 'Confirm the retailer is open to the data integrations that power Pulse and Echo.',
    color: '#5CE1E6',
    badgeClass: 'badge-standard',
    badge: 'STANDARD',
    critical: true,
    questions: [
      {
        id: 'g3q1',
        text: 'Is the retailer open in principle to sharing anonymised audience data from their stores?',
        go: 'Yes — open to anonymised audience measurement and data use for campaign targeting',
        nogo: 'No — firm refusal to allow any form of audience data collection on premises',
        note: 'Required for AiOO Pulse. Frame as anonymised, aggregated, GDPR-compliant'
      },
      {
        id: 'g3q2',
        text: 'Is the retailer open to POS data integration for campaign attribution?',
        go: 'Yes — willing to explore transaction data integration for attribution reporting',
        nogo: 'No — firm refusal to share any POS or sales data under any conditions',
        note: "Required for AiOO Echo. This is AiOO's core differentiator — non-negotiable"
      },
      {
        id: 'g3q3',
        text: 'Does the retailer have existing data governance constraints that could block integration?',
        go: 'No blocking constraints, or constraints that can be resolved with standard DPA',
        nogo: 'Hard contractual or regulatory blocks on third-party data access',
        note: 'GDPR, local data law, or exclusive data agreements with competitors are hard blocks'
      }
    ]
  },
  {
    id: 4,
    title: 'Gate 4 — Commercial Openness',
    subtitle: 'Confirm genuine intent and decision-making authority before investing further resources.',
    color: '#FF6F00',
    badgeClass: 'badge-standard',
    badge: 'STANDARD',
    critical: false,
    questions: [
      {
        id: 'g4q1',
        text: 'Is the person you are speaking with a decision-maker or a direct influencer?',
        go: 'C-suite, Commercial Director, or Head of Retail Media with budget authority',
        nogo: 'Junior contact with no authority and no confirmed access to decision-maker',
        note: "If not DM, ask: 'Who would need to be involved to move this forward?' Map the org."
      },
      {
        id: 'g4q2',
        text: 'Is the retailer genuinely exploring screen monetisation, or gathering market information?',
        go: 'Active intent — they have a monetisation objective and a timeline',
        nogo: 'Passive curiosity — benchmarking, no internal mandate or budget allocated',
        note: "Ask: 'What would success look like for you in the next 12 months?' Listen for specifics."
      },
      {
        id: 'g4q3',
        text: 'Is the retailer open in principle to an exclusivity arrangement with AiOO?',
        go: 'Open to exclusivity, or willing to discuss terms',
        nogo: 'Hard refusal — existing exclusive agreement with a competitor already signed',
        note: 'Exclusivity is a commercial negotiation point — openness to discuss is sufficient at this stage'
      },
      {
        id: 'g4q4',
        text: 'Does the retailer have any existing technology or partnerships that could conflict?',
        go: 'No conflicting technology or partnerships in place',
        nogo: 'Existing exclusive contract with a direct AiOO competitor covering same scope',
        note: 'Partial overlap is manageable — only hard exclusive conflicts are a No-Go at Discovery'
      }
    ]
  }
];

// ============================================================
//  STATE
// ============================================================
let answers = {};
let notes   = {};
let dealId  = '';
let dealTitle = '';
let lastSavedAt = null;

// ============================================================
//  INIT
// ============================================================
window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  dealId    = params.get('deal_id') || 'DEMO';
  dealTitle = decodeURIComponent(params.get('prospect') || 'Demo Prospect');

  document.getElementById('dealTag').textContent      = 'Deal #' + dealId;
  document.getElementById('dealTitleHeader').textContent = dealTitle;

  renderGates();
  renderSummary();

  if (APPS_SCRIPT_URL !== 'VOTRE_APPS_SCRIPT_URL_ICI') {
    await loadData();
  } else {
    const saved = localStorage.getItem('scorecard_' + dealId);
    if (saved) {
      const d = JSON.parse(saved);
      answers = d.answers || {};
      notes   = d.notes   || {};
      applyAnswers();
    }
  }

  document.getElementById('loadingOverlay').classList.add('hidden');
  updateProgress();
  updateVerdict();
};

// ============================================================
//  RENDER
// ============================================================
function renderGates() {
  const container = document.getElementById('gatesContainer');
  container.innerHTML = '';
  GATES.forEach(gate => {
    const card = document.createElement('div');
    card.className = 'gate-card';
    card.id = 'gate-card-' + gate.id;
    card.innerHTML = `
      <div class="gate-header">
        <div class="gate-number" style="background:${gate.color}18;color:${gate.color};border-color:${gate.color}40">${gate.id}</div>
        <div class="gate-info">
          <div class="gate-title" style="color:${gate.color}">${gate.title}</div>
          <div class="gate-subtitle">${gate.subtitle}</div>
        </div>
        <div class="gate-badge ${gate.badgeClass}">${gate.badge}</div>
      </div>
      <div class="questions-list">
        ${gate.questions.map(q => renderQuestion(q)).join('')}
      </div>`;
    container.appendChild(card);
  });
}

function renderQuestion(q) {
  return `
    <div class="question-row" id="row-${q.id}">
      <div class="question-left">
        <div class="question-text">${q.text}</div>
        <div class="go-nogo-labels">
          <span class="go-label">✓ ${q.go}</span>
          <span class="nogo-label">✗ ${q.nogo}</span>
        </div>
        ${q.note ? `<div class="question-note">💡 ${q.note}</div>` : ''}
      </div>
      <div class="toggle-group">
        <div class="toggle-options">
          <button class="toggle-btn" id="go-${q.id}"   onclick="setAnswer('${q.id}','go')">✓ GO</button>
          <button class="toggle-btn" id="nogo-${q.id}" onclick="setAnswer('${q.id}','nogo')">✗ NO-GO</button>
        </div>
        <textarea class="notes-field" id="notes-${q.id}" placeholder="Notes..."
          onchange="setNote('${q.id}', this.value)"
          onfocus="this.style.height='60px'"
          onblur="this.style.height='34px'"></textarea>
      </div>
    </div>`;
}

function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = GATES.map(g => `
    <div class="summary-gate" id="summary-gate-${g.id}">
      <div class="summary-gate-num" style="color:${g.color}40">${g.id}</div>
      <div class="summary-gate-label">${g.title.split('—')[1]?.trim() || ''}</div>
    </div>`).join('');
}

// ============================================================
//  ANSWERS
// ============================================================
function setAnswer(qId, val) {
  if (answers[qId] === val) {
    answers[qId] = null;
    document.getElementById('go-'   + qId).className = 'toggle-btn';
    document.getElementById('nogo-' + qId).className = 'toggle-btn';
  } else {
    answers[qId] = val;
    document.getElementById('go-'   + qId).className = val === 'go'   ? 'toggle-btn go-active'   : 'toggle-btn';
    document.getElementById('nogo-' + qId).className = val === 'nogo' ? 'toggle-btn nogo-active' : 'toggle-btn';
  }
  updateProgress();
  updateVerdict();
  updateGateCard();
}

function setNote(qId, val) { notes[qId] = val; }

function applyAnswers() {
  Object.entries(answers).forEach(([qId, val]) => {
    if (!val) return;
    const goB   = document.getElementById('go-'   + qId);
    const nogoB = document.getElementById('nogo-' + qId);
    if (goB)   goB.className   = val === 'go'   ? 'toggle-btn go-active'   : 'toggle-btn';
    if (nogoB) nogoB.className = val === 'nogo' ? 'toggle-btn nogo-active' : 'toggle-btn';
  });
  Object.entries(notes).forEach(([qId, val]) => {
    const f = document.getElementById('notes-' + qId);
    if (f) f.value = val;
  });
  updateGateCard();
}

// ============================================================
//  GATE STATUS
// ============================================================
function getGateStatus(gate) {
  const qIds     = gate.questions.map(q => q.id);
  const answered = qIds.filter(id => answers[id]);
  if (!answered.length) return 'unanswered';
  if (qIds.some(id => answers[id] === 'nogo')) return 'fail';
  if (answered.length === qIds.length) return 'pass';
  return 'partial';
}

function updateGateCard() {
  GATES.forEach(gate => {
    const status    = getGateStatus(gate);
    const card      = document.getElementById('gate-card-' + gate.id);
    const summaryEl = document.getElementById('summary-gate-' + gate.id);
    card.className = 'gate-card';
    summaryEl.className = 'summary-gate';
    if (status === 'pass') { card.classList.add('gate-pass'); summaryEl.classList.add('pass'); }
    if (status === 'fail') { card.classList.add('gate-fail'); summaryEl.classList.add('fail'); }
  });
}

// ============================================================
//  PROGRESS
// ============================================================
function updateProgress() {
  let completed = 0;
  GATES.forEach((gate, i) => {
    const s = getGateStatus(gate);
    const pill = document.getElementById('pill' + i);
    pill.className = 'gate-pill';
    if (s === 'pass')    { pill.classList.add('pass');    completed++; }
    else if (s === 'fail')    { pill.classList.add('fail');    completed++; }
    else if (s === 'partial') { pill.classList.add('partial'); }
  });
  document.getElementById('progressLabel').textContent = `${completed} / 5 gates evaluated`;
}

// ============================================================
//  VERDICT
// ============================================================
function updateVerdict() {
  const banner       = document.getElementById('verdictBanner');
  const criticalFail = GATES.filter(g => g.critical).some(g => getGateStatus(g) === 'fail');
  const borderline   = GATES.filter(g => !g.critical).some(g => getGateStatus(g) === 'fail');
  const allPass      = GATES.every(g => getGateStatus(g) === 'pass');
  const anyAnswered  = Object.values(answers).some(v => v);

  banner.className = 'verdict-banner';
  if (!anyAnswered) { return; }

  if (criticalFail) {
    banner.classList.add('show','nogo-banner');
    document.getElementById('verdictIcon').textContent  = '🚫';
    document.getElementById('verdictTitle').textContent = 'DISQUALIFIED — Critical gate failed';
    document.getElementById('verdictSub').textContent   = 'Stop immediately. Log the reason in the CRM.';
  } else if (allPass) {
    banner.classList.add('show','go-banner');
    document.getElementById('verdictIcon').textContent  = '✅';
    document.getElementById('verdictTitle').textContent = 'ALL GATES PASS — Proceed to Site Assessment';
    document.getElementById('verdictSub').textContent   = 'All criteria validated. Move to the next step.';
  } else if (borderline) {
    banner.classList.add('show','warn-banner');
    document.getElementById('verdictIcon').textContent  = '⚠️';
    document.getElementById('verdictTitle').textContent = 'BORDERLINE — Escalate to Sales Lead';
    document.getElementById('verdictSub').textContent   = 'Gate 2 or 4 failed. Do not decide alone — escalate before proceeding.';
  }
}

// ============================================================
//  SAVE
// ============================================================
async function saveData() {
  const btn     = document.getElementById('saveBtn');
  const btnText = document.getElementById('saveBtnText');
  const btnIcon = document.getElementById('saveBtnIcon');

  btn.className = 'save-btn saving';
  btnIcon.textContent = '⏳';
  btnText.textContent = 'Saving...';

  const payload = {
    action:     'save',
    deal_id:    dealId,
    deal_title: dealTitle,
    timestamp:  new Date().toISOString(),
    answers:    answers,
    notes:      notes,
    verdict:    getVerdict()
  };

  try {
    if (APPS_SCRIPT_URL !== 'VOTRE_APPS_SCRIPT_URL_ICI') {
      await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    } else {
      localStorage.setItem('scorecard_' + dealId, JSON.stringify({ answers, notes }));
      await new Promise(r => setTimeout(r, 700));
    }

    lastSavedAt = new Date();
    document.getElementById('lastSaved').textContent = 'Last saved: ' + lastSavedAt.toLocaleTimeString('en-GB');
    btn.className = 'save-btn saved';
    btnIcon.textContent = '✅';
    btnText.textContent = 'Saved!';
    showToast('Data saved to Google Sheets', 'success');

    setTimeout(() => {
      btn.className = 'save-btn';
      btnIcon.textContent = '💾';
      btnText.textContent = 'Save';
    }, 2500);

  } catch (err) {
    btn.className = 'save-btn';
    btnIcon.textContent = '💾';
    btnText.textContent = 'Save';
    showToast('Error while saving', 'error');
  }
}

// ============================================================
//  LOAD
// ============================================================
async function loadData() {
  try {
    const url = APPS_SCRIPT_URL + '?action=load&deal_id=' + encodeURIComponent(dealId);
    const res  = await fetch(url);
    const data = await res.json();
    if (data && data.answers) {
      answers = data.answers;
      notes   = data.notes || {};
      applyAnswers();
      if (data.timestamp) {
        document.getElementById('lastSaved').textContent = 'Last saved: ' + new Date(data.timestamp).toLocaleString('en-GB');
      }
    }
  } catch (err) {
    console.warn('Unable to load data:', err);
  }
}

// ============================================================
//  VERDICT STRING
// ============================================================
function getVerdict() {
  if (GATES.filter(g => g.critical).some(g => getGateStatus(g) === 'fail')) return 'DISQUALIFIED';
  if (GATES.every(g => getGateStatus(g) === 'pass'))                         return 'GO';
  if (GATES.filter(g => !g.critical).some(g => getGateStatus(g) === 'fail')) return 'BORDERLINE';
  return 'IN_PROGRESS';
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.className = 'toast', 3000);
}
</script>
